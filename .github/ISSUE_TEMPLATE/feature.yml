name: "✨ Feature"
description: "Propose a new feature or improvement."
title: "[FEAT] "
labels:
  - "type: feature"
  - "status: triage"

body:
  - type: textarea
    id: motivation
    attributes:
      label: "Why?"
      description: >
        What problem does this feature solve?
        Which use case is currently impossible or cumbersome?
      placeholder: |
        As a user, I cannot express a boundary condition that depends on…
        The current `Mesh` trait does not allow…
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "What?"
      description: "Precise description of the desired feature."
      placeholder: |
        Add a method `xxx` on `YyyTrait` that…
        The `zzz` module should expose an interface enabling…
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "Acceptance criteria"
      description: >
        Verifiable conditions. Each criterion should map to a test or doctest.
      placeholder: |
        - [ ] `cargo test` passes — coverage ≥ 80%
        - [ ] `cargo clippy -- -D warnings`: 0 errors
        - [ ] Doctests compile and pass (`cargo test --doc`)
        - [ ] Existing public API unchanged (or breaking change documented)
        - [ ] `CHANGELOG.md` updated
      render: markdown
    validations:
      required: true

  - type: textarea
    id: api-sketch
    attributes:
      label: "API sketch (optional)"
      description: >
        Proposed trait signatures, usage examples, or Cargo feature changes.
        Need not be final.
      placeholder: |
        ```rust
        pub trait NewTrait: RequiresContext + Send + Sync {
            fn compute(&self, ctx: &ComputeContext) -> Result<ContextValue, OxiflowError>;
        }

        // Usage
        let result = model.compute(&ctx)?;
        ```
      render: markdown
    validations:
      required: false

  - type: input
    id: related-dd
    attributes:
      label: "Related Design Decisions"
      description: "DD issue numbers covering the associated architecture choices."
      placeholder: "#xx (DD-003), #xx (DD-006)"
    validations:
      required: false

  - type: checkboxes
    id: scope
    attributes:
      label: "Affected scopes"
      description: "Apply the matching `scope:` labels manually after creation."
      options:
        - label: "`api` — public traits or types"
        - label: "`docs` — rustdoc, examples, guides"
        - label: "`tests` — unit tests, integration tests, doctests"
        - label: "`ci` — GitHub Actions, coverage, cargo features"

  - type: dropdown
    id: priority
    attributes:
      label: "Priority"
      description: "Apply the matching `priority:` label after creation."
      options:
        - "none — nice-to-have, outside immediate roadmap"
        - "low — in the next version"
        - "medium — in the target version"
        - "high — blocks the release"
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: "Estimated effort"
      description: "Apply the matching `effort:` label after creation."
      options:
        - "XS — < 1 h"
        - "S  — half-day"
        - "M  — 1 day"
        - "L  — 2–3 days"
        - "XL — > 3 days"
    validations:
      required: true

  - type: dropdown
    id: breaking
    attributes:
      label: "Breaking change?"
      description: >
        If yes, replace `type: feature` with `type: breaking`
        and update the version constraints accordingly.
      options:
        - "No — backward-compatible"
        - "Yes — requires a minor or major version bump"
    validations:
      required: true

  - type: dropdown
    id: fem-invariant
    attributes:
      label: "FEM invariant impacted"
      description: "If this feature must comply with or activates an INV, note it."
      options:
        - "None"
        - "INV-1 — Mesh abstrait"
        - "INV-2 — DiscreteOperator générique"
        - "INV-3 — CouplingOperator inter-domaines"
        - "INV-4 — API plugin-safe"
    validations:
      required: false

  - type: checkboxes
    id: submit-checklist
    attributes:
      label: "Pre-submission checklist"
      options:
        - label: "The feature does not already exist (checked docs and open issues)"
          required: true
        - label: "Backward-compatibility constraint has been assessed"
          required: true
        - label: "A DD issue is created or referenced if architecture choices are involved"
