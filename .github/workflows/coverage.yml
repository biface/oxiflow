name: Code Coverage

# Génère et publie le rapport de couverture sur codecov.io
# Utilise cargo-llvm-cov (source-based coverage via LLVM)

on:
  push:
    branches:
      - main
      - master
      - 'feature/**'
  pull_request:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  coverage:
    name: Generate Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Historique complet pour le suivi de branche codecov

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      # - name: Install system dependencies
      #  run: |
      #    sudo apt-get update
      #    sudo apt-get install -y pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-coverage-

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate code coverage (default features)
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Generate code coverage (all features)
        run: |
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov-all-features.info

      # Les feature flags parallel/serde/hdf5 sont testés séparément
      # pour isoler leur couverture dans les composants codecov
      - name: Generate coverage — feature parallel
        run: |
          cargo llvm-cov --workspace --features parallel --lcov \
            --output-path lcov-parallel.info

      - name: Generate coverage — feature serde
        run: |
          cargo llvm-cov --workspace --features serde --lcov \
            --output-path lcov-serde.info

      # Upload principal : all-features (couverture la plus complète)
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov-all-features.info
          fail_ci_if_error: false
          flags: unittests
          name: codecov-oxiflow
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      # Upload secondaire : feature parallel (flag dédié)
      - name: Upload coverage — parallel feature
        uses: codecov/codecov-action@v4
        with:
          files: lcov-parallel.info
          fail_ci_if_error: false
          flags: parallel
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Archive coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            lcov.info
            lcov-all-features.info
            lcov-parallel.info
            lcov-serde.info
          retention-days: 30

      - name: Display coverage summary
        run: |
          echo "📊 Coverage Report Generated"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Commit  : ${{ github.sha }}"
          echo "Report  : https://codecov.io/gh/${{ github.repository }}"