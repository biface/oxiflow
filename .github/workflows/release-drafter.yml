name: Release Drafter (SemVer)

# -----------------------------------------------------------------------------
# oxiflow uses the vX.Y.Z SemVer versioning scheme.
#
# Behaviour:
#   push to main / PR event  →  update the rolling release draft
#   push of a vX.Y.Z tag     →  publish the draft and link it to the tag;
#                                release-drafter then opens a new draft for
#                                the next version automatically
#
# Configuration: .github/release-drafter-semver.yml
# -----------------------------------------------------------------------------

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter-semver.yml
          # Publish the draft when a vX.Y.Z tag is pushed; update otherwise.
          publish: ${{ startsWith(github.ref, 'refs/tags/') }}
          # Link the published release to the pushed tag.
          tag: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
